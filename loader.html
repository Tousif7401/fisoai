<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Branch Loader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo-svg {
      width: 90px;
      height: 90px;
      animation: spin 3s linear infinite;
      transform-origin: center;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Pulse variant on the whole icon */
    .logo-svg path,
    .logo-svg g path {
      animation: fade-branches 3s ease-in-out infinite;
    }

    @keyframes fade-branches {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1a1a1a;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40%           { transform: translateY(-8px); opacity: 1; }
    }

    .label {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      font-weight: 500;
    }

    /* ── Spinner ring variant below ── */
    .ring-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin-top: 48px;
    }

    .ring-wrap svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .ring-track { fill: none; stroke: #e0deda; stroke-width: 3; }
    .ring-fill  {
      fill: none;
      stroke: #1a1a1a;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: ring-draw 2s ease-in-out infinite alternate;
      transform-origin: center;
      transform: rotate(-90deg);
    }

    @keyframes ring-draw {
      from { stroke-dashoffset: 200; }
      to   { stroke-dashoffset: 20; }
    }

    .ring-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      animation: spin 3s linear infinite;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: #d0cec8;
      margin: 32px 0 0;
    }

    .variant-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      margin-top: 20px;
    }
  </style>
</head>

          <g transform="rotate(315)"> <path d="M0,-50 C6,-46 10,-41 12,-35" stroke-width="2.2"/><path d="M12,-35 C15,-29 14,-23 12,-18" stroke-width="1.6"/><path d="M12,-35 C17,-32 20,-27 20,-21" stroke-width="1.2"/><path d="M0,-50 C-6,-46 -10,-41 -12,-35" stroke-width="2.2"/><path d="M-12,-35 C-15,-29 -14,-23 -12,-18" stroke-width="1.6"/><path d="M-12,-35 C-17,-32 -20,-27 -20,-21" stroke-width="1.2"/><path d="M0,-50 C0,-44 0,-40 0,-34" stroke-width="2.0"/><path d="M0,-34 C4,-30 6,-25 6,-19" stroke-width="1.4"/><path d="M0,-34 C-4,-30 -6,-25 -6,-19" stroke-width="1.4"/></g>
        </g>
      </g>
    </svg>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <span class="label">Loading…</span>

    <div class="divider"></div>

    <!-- Variant B: ring progress + spinning icon -->
    <p class="variant-label">Variant B — arc progress</p>

    <div class="ring-wrap">
      <svg viewBox="0 0 90 90">
        <circle class="ring-track" cx="45" cy="45" r="40"/>
        <circle class="ring-fill"  cx="45" cy="45" r="40"/>
      </svg>
